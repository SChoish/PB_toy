name: Toy Examples

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test dependencies
        # Tests import agents (flax/jax); research extras are required.
        run: python -m pip install -e ".[research,test]"
      - name: Run tests
        run: python -m pytest

  research-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install research dependencies
        run: python -m pip install -e ".[research]"
      - name: Import agents and training entry points
        run: |
          python -c "import agents"
          python -c "import car_race.train"
          python -c "import car_parking.train"
          python -c "import swingby.train"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install build
          python -m build
